## 三、UOM平台使用指南

### 3.1 UOM平台简介

**UOM（Unmanned Aircraft System Operation Management）** 即民用无人驾驶航空器综合管理平台，是CAAC建立的无人机统一管理信息系统。

| 项目 | 信息 |
|------|------|
| **官方网址** | https://uom.caac.gov.cn/ |
| **主管部门** | 中国民用航空局 |
| **功能定位** | 无人机全生命周期管理服务平台 |

### 3.2 UOM平台主要功能

| 功能模块 | 具体内容 | 使用对象 |
|----------|----------|----------|
| **实名登记** | 无人机所有者信息登记、登记标志管理 | 所有无人机所有者 |
| **操控员管理** | 执照申请、执照查询、执照续期 | 无人机操控员 |
| **运行管理** | 飞行活动申请、飞行计划申报 | 操控员/运营企业 |
| **运营管理** | 运营合格证申请与管理 | 无人机运营企业 |
| **培训机构管理** | 训练机构资质申请与管理 | 培训机构 |
| **产品管理** | 无人机产品信息登记 | 制造商/进口商 |
| **空域信息查询** | 查询适飞空域、管制空域信息 | 所有用户 |

### 3.3 实名登记操作步骤

| 步骤 | 操作 |
|------|------|
| 1. 注册账号 | 访问UOM平台，使用手机号或邮箱注册 |
| 2. 实名认证 | 完成个人或单位实名认证 |
| 3. 添加无人机 | 进入"登记管理" → "实名登记"，填写无人机信息 |
| 4. 信息填写 | 填写制造商、型号、序列号、重量等信息 |
| 5. 生成登记标志 | 系统生成唯一的实名登记标志（二维码） |
| 6. 粘贴标志 | 将登记标志粘贴在无人机明显位置 |

> **登记要求**：除微型无人机外，其他类别的无人机**必须**进行实名登记。具体条款请参考CAAC最新法规。

### 3.4 飞行活动申请操作步骤

| 步骤 | 操作 |
|------|------|
| 1. 登录系统 | 使用已注册账号登录UOM平台 |
| 2. 进入申请 | 选择"运行管理" → "飞行活动申请" |
| 3. 填写信息 | 按照表单要求填写飞行活动详细信息 |
| 4. 提交申请 | 确认信息无误后提交 |
| 5. 等待审批 | 关注系统通知和审批状态 |
| 6. 获取批复 | 审批通过后下载飞行批准文件 |

