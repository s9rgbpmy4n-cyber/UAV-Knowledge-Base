# 空域管理

> 中国空域分类、无人机飞行申请流程与UOM平台使用指南

---

## 一、中国空域分类

### 1.1 空域划分体系

根据《无人驾驶航空器飞行管理暂行条例》和《民用无人驾驶航空器运行安全管理规则》（CCAR-92部），中国空域按照管理权限和飞行规则分为不同类型。

### 1.2 空域分类

| 空域类型 | 定义 | 无人机飞行要求 |
|----------|------|----------------|
| **管制空域** | 由空中交通管制部门实施管制的空域 | 必须提前申请并获得批准后方可飞行 |
| **监视空域** | 空管部门监视但不主动管制的空域 | 需按要求报备飞行活动 |
| **报告空域** | 需要向空管部门报告飞行活动的空域 | 需提前报告飞行计划 |
| **适飞空域** | 划设的允许微型、轻型无人机飞行的空域 | 符合条件可在满足规则的前提下自由飞行 |

### 1.3 管制空域的主要范围

| 区域 | 说明 |
|------|------|
| 机场及周边区域 | 机场净空保护区范围内 |
| 空中禁区、空中危险区 | 国家划设的特殊空域 |
| 国境线附近 | 靠近国界的特定范围 |
| 重要目标上空 | 重要政治、军事、经济设施上空 |
| 其他管制区域 | 法律、行政法规规定的管制区域 |

---

## 二、无人机飞行空域申请流程

### 2.1 申请基本原则

| 场景 | 是否需要申请 |
|------|--------------|
| 微型无人机在适飞空域 | 通常无需申请 |
| 轻型无人机在适飞空域（≤120m） | 需实名登记，飞行前报备 |
| 小型及以上无人机 | 必须提前申请 |
| 所有无人机在管制空域 | 必须提前申请并获得批准 |
| 超视距飞行 | 必须提前申请 |

### 2.2 飞行活动申请流程

```
┌─────────────────────────────────────────────────────┐
│  Step 1: 登录UOM平台                                  │
│    ↓ 访问 https://uom.caac.gov.cn/                   │
│    ↓ 使用已注册的账号登录                             │
├─────────────────────────────────────────────────────┤
│  Step 2: 提交飞行活动申请                              │
│    ↓ 进入"运行管理" → "飞行活动申请"                  │
│    ↓ 填写飞行活动信息：                                │
│      - 飞行时间（起始/结束）                           │
│      - 飞行区域（坐标/半径/高度）                      │
│      - 无人机信息（型号/序列号）                       │
│      - 操控员信息（执照编号）                          │
│      - 飞行目的                                       │
│      - 应急联络方式                                   │
├─────────────────────────────────────────────────────┤
│  Step 3: 等待审批                                     │
│    ↓ 系统会自动分发给相应的空管部门                    │
│    ↓ 审批时间根据区域和复杂度不同                     │
│    ↓ 可通过系统查询审批进度                            │
├─────────────────────────────────────────────────────┤
│  Step 4: 获取审批结果                                  │
│    ↓ 审批通过：获得飞行批准文件                        │
│    ↓ 审批驳回：查看原因，修改后重新申请                 │
├─────────────────────────────────────────────────────┤
│  Step 5: 实施飞行                                     │
│    ↓ 按照批准的时间、区域、高度执行飞行                │
│    ↓ 保持通信畅通                                     │
│    ↓ 如遇突发情况及时报告                              │
└─────────────────────────────────────────────────────┘
```

### 2.3 申请材料清单

| 材料 | 说明 | 必要性 |
|------|------|--------|
| 操控员执照 | CAAC颁发的有效执照 | 必须 |
| 无人机实名登记证明 | UOM平台的登记信息 | 必须 |
| 责任保险证明 | 有效期的保险单据 | 小型及以上必须 |
| 飞行计划书 | 详细的飞行方案说明 | 视情况 |
| 任务合同/函件 | 如果是商业任务 | 商业飞行需要 |
| 应急处置方案 | 紧急情况的应对方案 | 视情况 |

