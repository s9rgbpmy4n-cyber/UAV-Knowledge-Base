## 七、空域管理速查表

| 问题 | 答案 |
|------|------|
| 在哪里查询适飞空域？ | UOM平台首页的空域信息查询功能 |
| 轻型无人机在适飞空域需要申请吗？ | 需实名登记并在飞行前在UOM报备 |
| 飞行申请提前多久提交？ | 建议提前1-3个工作日 |
| 可以申请夜间飞行吗？ | 一般不允许，特殊情况需特别审批 |
| 超视距飞行必须申请吗？ | 是的，所有超视距飞行都必须提前申请 |
| 飞行区域跨地区怎么办？ | 需分别向各地区的空管部门申请 |
| 如何知道申请是否通过？ | UOM平台会推送通知，也可在系统中查询 |

