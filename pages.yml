## 四、飞行计划申报要求

### 4.1 申报时机

| 情况 | 申报要求 |
|------|----------|
| 常规飞行活动 | 提前1-3个工作日申报 |
| 大型/复杂活动 | 提前5-7个工作日申报 |
| 紧急任务 | 尽可能提前，必要时可协调加急 |
| 经常性飞行 | 可申请固定空域或周期性飞行计划 |

### 4.2 飞行计划内容

| 内容项 | 说明 |
|--------|------|
| **申请人信息** | 姓名/单位、联系方式、执照信息 |
| **无人机信息** | 型号、重量、序列号、登记编号 |
| **飞行时间** | 计划起飞和降落时间 |
| **飞行区域** | 经纬度坐标、飞行半径、飞行高度 |
| **飞行目的** | 航拍、巡检、测绘、农业等 |
| **操控方式** | 视距内/超视距、手动/自主飞行 |
| **应急措施** | 紧急联系人、应急处置方案 |

### 4.3 飞行计划变更与取消

| 操作 | 说明 |
|------|------|
| **变更** | 如飞行时间、区域等发生变化，需在系统中申请变更 |
| **取消** | 如飞行取消，需在系统中及时取消申请，避免影响后续申请 |
| **超时** | 获批后超时未执行，需重新申请 |

---

## 五、临时空域与固定空域

### 5.1 临时空域

| 项目 | 说明 |
|------|------|
| **定义** | 为单次或短期飞行任务临时划设的空域 |
| **适用场景** | 单次商业拍摄、临时巡检、应急任务等 |
| **申请方式** | 每次任务前通过UOM平台单独申请 |
| **有效期** | 通常仅为申请的飞行时段 |
| **特点** | 灵活性高，但每次需单独审批 |

### 5.2 固定空域（长期空域）

| 项目 | 说明 |
|------|------|
| **定义** | 为经常性飞行任务划设的相对固定的飞行空域 |
| **适用场景** | 定期巡检、长期项目、培训机构训练等 |
| **申请方式** | 向地区空管局或民航地区管理局提交长期申请 |
| **有效期** | 可获批数月甚至一年，到期后需续期 |
| **特点** | 审批流程较复杂，但获批后使用便利 |

### 5.3 两种空域对比

| 对比项 | 临时空域 | 固定空域 |
|--------|----------|----------|
| 审批复杂度 | 相对简单 | 较复杂 |
| 审批时间 | 1-3个工作日 | 数周 |
| 使用灵活性 | 单次有效 | 长期有效 |
| 适用频率 | 低频次任务 | 高频次/常规任务 |
| 申请材料 | 简化 | 详细，需运营方案 |

---

## 六、违规飞行后果

### 6.1 常见违规行为

| 行为 | 违规性质 |
|------|----------|
| 未经批准在管制空域飞行 | 严重违规 |
| 超过批准的高度/范围飞行 | 违规 |
| 在禁飞区飞行 | 严重违规，可能追究法律责任 |
| 未取得执照操控小型以上无人机 | 违规 |
| 未实名登记飞行 | 违规 |
| 干扰其他航空器 | 严重违规，追究法律责任 |

### 6.2 处罚措施

根据《无人驾驶航空器飞行管理暂行条例》规定：

| 违规类型 | 可能处罚 |
|----------|----------|
| 一般违规 | 警告、罚款（具体金额请参考CAAC最新法规） |
| 严重违规 | 更高金额罚款、暂扣或吊销执照 |
| 危及安全 | 治安管理处罚或刑事责任 |

